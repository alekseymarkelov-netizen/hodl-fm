<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>HODL FM — фоновое чувство рынка</title>
<meta name="description" content="Фоновая музыка, меняющаяся по тренду биткоина. Не алёрт — ambient awareness. Made by Siberia Ventures." />
<meta property="og:title" content="HODL FM" />
<meta property="og:description" content="Фоновое чувство крипто-рынка. Без алёртов." />
<meta name="theme-color" content="#EDE8E1" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23EDE8E1'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%237A8472'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<!-- Подгружаем только дефолтный луп заранее — остальные 4 лениво по запросу -->
<link rel="prefetch" href="audio/still.ogg" as="audio" type="audio/ogg" />
<style>
  :root {
    /* anchor neutral — warm linen, never pure white */
    --anchor: #EDE8E1;
    --ink: #2A2520;
    --muted: #6B6460;
    --very-muted: #B0A99F;
    --sleeve: #F5F2EE;

    /* state-driven, set by JS */
    --bg: #EDE8E1;
    --accent: #6B6460;

    /* timings (concept §5) */
    --t-bg: 12000ms;       /* длинный fade чтобы цвет всё время «дышал» между tick'ами раз в 15с */
    --t-sleeve: 8000ms;
    --t-text: 600ms;
    --t-quick: 160ms;

    --ease: cubic-bezier(0.16, 1, 0.3, 1);   /* expo-out */
    --ease-quick: ease-out;
  }
  @media (prefers-reduced-motion: reduce) {
    :root { --t-bg: 200ms; --t-sleeve: 200ms; --t-text: 300ms; --t-quick: 0ms; }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: "DM Sans", system-ui, -apple-system, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    transition: background-color var(--t-bg) var(--ease);
  }

  .app {
    position: relative;
    height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 24px clamp(20px, 4vw, 40px);
  }

  /* ---- Header --------------------------------------------------------- */
  header {
    font-size: 13px;
    color: var(--very-muted);
    letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 14px;
  }
  .wordmark { font-weight: 500; letter-spacing: 0.14em; }

  .on-air {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity 600ms var(--ease), transform 600ms var(--ease), color var(--t-sleeve) var(--ease);
    pointer-events: none;
  }
  .on-air.live { opacity: 1; transform: translateY(0); }
  .on-air .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    transition: background-color var(--t-sleeve) var(--ease);
    animation: onair-pulse 1800ms var(--ease) infinite;
  }
  @keyframes onair-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.35; transform: scale(0.7); }
  }
  @media (prefers-reduced-motion: reduce) {
    .on-air .dot { animation: none; }
  }

  /* ---- Main: sleeve, ticker, CTA ------------------------------------- */
  main {
    display: grid;
    place-items: center;
    align-content: center;
    gap: 28px;
    transform: translateY(-4%);  /* optical centering, not mathematical */
  }

  .sleeve {
    width: 320px; max-width: calc(100vw - 40px);
    background: var(--sleeve);
    border: 1px solid var(--accent);
    padding: 22px 22px 18px 22px;
    display: grid;
    gap: 6px;
    transition: border-color var(--t-sleeve) var(--ease), background-color var(--t-sleeve) var(--ease);
  }
  .state-name {
    font-family: "DM Serif Display", Georgia, serif;
    font-weight: 400;
    font-size: clamp(40px, 6vw, 56px);
    line-height: 1.0;
    color: var(--ink);
    letter-spacing: -0.01em;
    transition: opacity var(--t-text) var(--ease-quick);
  }
  .state-name.swap { opacity: 0; }

  .track-name {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.01em;
    transition: opacity var(--t-text) var(--ease-quick);
  }
  .track-name.swap { opacity: 0; }

  /* visualizer — 5 thin bars, bottom-aligned */
  .viz {
    display: flex; gap: 5px;
    height: 32px;
    align-items: flex-end;
    margin-top: 12px;
    transition: opacity 800ms var(--ease-quick);
  }
  .viz.muted { opacity: 0.25; }
  .viz .bar {
    width: 4px;
    background: var(--accent);
    transform-origin: bottom;
    transform: scaleY(0.35);
    transition: background-color var(--t-sleeve) var(--ease);
    will-change: transform;
  }

  /* ticker line under sleeve */
  .ticker {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0;
    display: flex; gap: 14px; align-items: baseline;
  }
  .ticker .price { color: var(--ink); }
  .ticker .delta-up { color: #2E5C35; }
  .ticker .delta-down { color: #7A4A3A; }
  .mute-btn {
    background: none; border: 0; padding: 0; margin: 0;
    color: var(--muted);
    font: inherit;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    cursor: pointer;
    transition: color var(--t-quick) var(--ease-quick), transform 80ms var(--ease-quick);
  }
  .mute-btn:hover { color: var(--ink); }
  .mute-btn:active { transform: scale(0.85); }

  /* CTA */
  .cta {
    font-family: "DM Sans", sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--accent);
    padding: 10px 24px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex; gap: 6px; align-items: center;
    transition:
      background-color var(--t-quick) var(--ease-quick),
      color var(--t-quick) var(--ease-quick),
      border-color var(--t-sleeve) var(--ease),
      transform 80ms var(--ease-quick);
  }
  .cta .arrow { transition: transform var(--t-quick) var(--ease-quick); display: inline-block; }
  .cta:hover { background: var(--accent); color: var(--anchor); }
  .cta:hover .arrow { transform: translateX(4px); }
  .cta:active { transform: scale(0.99); }

  /* ---- Footer --------------------------------------------------------- */
  footer {
    display: flex; justify-content: flex-end;
    font-size: 11px;
    color: var(--very-muted);
  }
  footer a {
    color: inherit;
    text-decoration: none;
    transition: color var(--t-quick) var(--ease-quick);
  }
  footer a:hover { color: var(--accent); }

  /* ---- Welcome overlay (первый визит) -------------------------- */
  .welcome {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: var(--anchor);
    z-index: 100;
    cursor: pointer;
    user-select: none;
    transition: opacity 600ms var(--ease), visibility 600ms var(--ease);
    padding: 40px;
  }
  .welcome.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .welcome-inner {
    display: grid;
    place-items: center;
    gap: 28px;
    text-align: center;
  }
  .welcome-eyebrow {
    font-family: "DM Sans", sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.16em;
    color: var(--very-muted);
    text-transform: uppercase;
  }
  .welcome-title {
    font-family: "DM Serif Display", Georgia, serif;
    font-size: clamp(28px, 4.5vw, 42px);
    line-height: 1.15;
    color: var(--ink);
    letter-spacing: -0.01em;
    max-width: 540px;
  }
  .welcome-sub {
    font-family: "DM Sans", sans-serif;
    font-size: 14px;
    color: var(--muted);
    max-width: 420px;
    line-height: 1.5;
  }
  .welcome-play {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    background: var(--sleeve);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: transform 220ms var(--ease-quick), background-color 220ms var(--ease-quick), border-color 220ms var(--ease-quick);
    /* мягкая пульсация — сигнал живости, но без навязчивости */
    animation: welcomePulse 2.6s var(--ease) infinite;
  }
  .welcome-play:hover {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.04);
  }
  .welcome-play:hover svg { fill: var(--anchor); }
  .welcome-play:active { transform: scale(0.96); }
  .welcome-play svg {
    width: 28px; height: 28px;
    fill: var(--ink);
    margin-left: 4px; /* оптическое центрирование треугольника */
    transition: fill 220ms var(--ease-quick), opacity 200ms var(--ease-quick);
  }
  /* Состояние «загружаем»: треугольник исчезает, появляется спиннер */
  .welcome-play.loading {
    animation: none;
    cursor: progress;
    pointer-events: none;
  }
  .welcome-play.loading svg { opacity: 0; }
  .welcome-play .spinner {
    position: absolute;
    width: 28px; height: 28px;
    border: 2px solid var(--accent);
    border-top-color: transparent;
    border-radius: 50%;
    opacity: 0;
    animation: welcomeSpin 900ms linear infinite;
    transition: opacity 200ms var(--ease-quick);
  }
  .welcome-play.loading .spinner { opacity: 0.7; }
  .welcome-play { position: relative; }
  @keyframes welcomeSpin {
    to { transform: rotate(360deg); }
  }
  @keyframes welcomePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(122, 132, 114, 0.0); }
    50% { box-shadow: 0 0 0 14px rgba(122, 132, 114, 0.08); }
  }

  .welcome-foot {
    transition: opacity 200ms var(--ease-quick);
  }
  .welcome-foot.fade { opacity: 0.5; }
  .welcome-foot {
    font-family: "DM Sans", sans-serif;
    font-size: 12px;
    color: var(--very-muted);
    letter-spacing: 0.02em;
  }
  @media (prefers-reduced-motion: reduce) {
    .welcome-play { animation: none; }
    .welcome-play .spinner { animation: none; opacity: 0.7; }
  }

  /* ---- Tap-hint (фаллбэк, если overlay не показывается) -------- */
  .tap-hint {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.02em;
    cursor: pointer;
    user-select: none;
    padding: 12px 18px;
    transition: color var(--t-quick) var(--ease-quick);
  }
  .tap-hint:hover { color: var(--ink); }

  .hidden { display: none !important; }

  /* status dot for connection */
  .status-line {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    color: var(--very-muted);
    letter-spacing: 0;
    margin-top: 4px;
    height: 14px;
    transition: opacity var(--t-text) var(--ease-quick);
    opacity: 0;
  }
  .status-line.visible { opacity: 1; }
</style>
</head>
<body>
  <div class="app" aria-live="polite">
    <header>
      <span class="wordmark">HODL FM</span>
      <span class="on-air" id="on-air" aria-hidden="true">
        <span class="dot"></span><span>ON AIR</span>
      </span>
    </header>

    <main>
      <div class="sleeve" id="sleeve">
        <div class="state-name" id="state-name">—</div>
        <div class="track-name" id="track-name">—</div>
        <div class="viz" id="viz" aria-hidden="true">
          <span class="bar"></span><span class="bar"></span>
          <span class="bar"></span><span class="bar"></span>
          <span class="bar"></span>
        </div>
      </div>

      <div class="ticker">
        <span class="price" id="price">— —</span>
        <span id="delta">—</span>
        <button class="mute-btn" id="mute" aria-label="mute / unmute">◉</button>
      </div>
      <div class="status-line" id="status">reconnecting</div>

      <a class="cta" id="cta" href="#" target="_blank" rel="noopener">
        <span>Trade on Hyperliquid</span><span class="arrow">→</span>
      </a>

      <div class="tap-hint hidden" id="tap-hint">tap anywhere to begin</div>
    </main>

    <div class="welcome" id="welcome" role="dialog" aria-label="Start ambient audio">
      <div class="welcome-inner">
        <div class="welcome-eyebrow">HODL FM</div>
        <h1 class="welcome-title">Ambient music that follows bitcoin.</h1>
        <p class="welcome-sub">Five textures for five market moods. Plays in the background while you do something else. No alerts, no charts.</p>
        <button class="welcome-play" id="welcome-play" aria-label="Start audio">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3.5v17l15-8.5z"/></svg>
          <span class="spinner" aria-hidden="true"></span>
        </button>
        <div class="welcome-foot" id="welcome-foot">tap to start · sound on</div>
      </div>
    </div>

    <footer>
      <span>made by <a href="https://siberia.fund" target="_blank" rel="noopener">Siberia Ventures</a></span>
    </footer>
  </div>

<script>
/* =========================================================================
   crypto-mood V0.5
   - CoinGecko 1h price change (CORS-friendly, no geoblock)
   - 5 states by % change: FALLING / COOLING / STILL / RISING / SURGE
   - Per-state ambient synthesis via Web Audio API (no external mp3)
   - Cross-fade between two voices on state change (~5–8s)
   - Visual transitions per design concept §5 (4000ms expo-out via anchor)
   ========================================================================= */

/* ---- States (concept §2) ------------------------------------------------ */
// thresholds in % BTC change vs 1h ago
const STATES = [
  {
    id: "falling", min: -Infinity, max: -1.5,
    label: "FALLING",
    track: "Cold Lavender, No. 1",
    bg: "#D6CFDC", accent: "#3E3548", sleeve: "#E5DFE9",
    loop: "audio/falling.ogg",
    sample: { gain: 0.85, filterHz: 1800, rate: 0.96 },  // чуть медленнее и глухее
    // fallback synth recipe — slow, low, sparse
    synth: { baseHz: 110, intervals: [0, 3, 7, 10], rateMs: 5200, pulseLen: 3.6, lfoHz: 0.08, filterHz: 480, gain: 0.18 }
  },
  {
    id: "cooling", min: -1.5, max: -0.3,
    label: "COOLING",
    track: "Pale Clay Drift",
    bg: "#E8DAD0", accent: "#7A4A3A", sleeve: "#F0E5DC",
    loop: "audio/cooling.ogg",
    sample: { gain: 0.80, filterHz: 2400, rate: 0.98 },
    synth: { baseHz: 130, intervals: [0, 3, 7], rateMs: 4400, pulseLen: 3.0, lfoHz: 0.12, filterHz: 700, gain: 0.18 }
  },
  {
    id: "still", min: -0.3, max: 0.3,
    label: "STILL",
    track: "Fog Study, No. 3",
    bg: "#EDE8E1", accent: "#6B6460", sleeve: "#F5F2EE",
    loop: "audio/still.ogg",
    sample: { gain: 0.78, filterHz: 3000, rate: 1.00 },
    synth: { baseHz: 146.83, intervals: [0, 5, 7], rateMs: 4000, pulseLen: 2.6, lfoHz: 0.18, filterHz: 900, gain: 0.16 }
  },
  {
    id: "rising", min: 0.3, max: 1.5,
    label: "RISING",
    track: "Faded Moss",
    bg: "#D8E5D2", accent: "#4A7050", sleeve: "#E6EFE0",
    loop: "audio/rising.ogg",
    sample: { gain: 0.85, filterHz: 4000, rate: 1.00 },
    synth: { baseHz: 164.81, intervals: [0, 4, 7], rateMs: 3400, pulseLen: 2.4, lfoHz: 0.24, filterHz: 1200, gain: 0.18 }
  },
  {
    id: "surge", min: 1.5, max: Infinity,
    label: "SURGE",
    track: "Sage Bloom",
    bg: "#BDD8B6", accent: "#2E5C35", sleeve: "#D2E4CB",
    loop: "audio/surge.ogg",
    sample: { gain: 0.92, filterHz: 5500, rate: 1.02 },  // чуть ярче и быстрее
    synth: { baseHz: 196.0, intervals: [0, 4, 7, 11], rateMs: 2800, pulseLen: 2.2, lfoHz: 0.32, filterHz: 1600, gain: 0.20 }
  }
];

/* ---- Ambient synth voice ------------------------------------------------
   Each "voice" plays a slow arpeggio of pad-tones generated procedurally.
   Two voices total — we cross-fade between them on state change.
-------------------------------------------------------------------------- */
class AmbientVoice {
  constructor(ctx, dest) {
    this.ctx = ctx;
    this.master = ctx.createGain();
    this.master.gain.value = 0;
    this.filter = ctx.createBiquadFilter();
    this.filter.type = "lowpass";
    this.filter.frequency.value = 800;
    this.filter.Q.value = 0.6;
    this.master.connect(this.filter).connect(dest);
    this.recipe = null;
    this.timer = null;
    this.lfo = null; this.lfoGain = null;
    this.alive = true;
  }
  start(recipe) {
    this.recipe = recipe;
    // Ставим фильтр сразу на целевое значение, не рампим — иначе первые 4с звук глухой
    this.filter.frequency.cancelScheduledValues(this.ctx.currentTime);
    this.filter.frequency.value = recipe.filterHz;
    // slow LFO modulating filter for breathing feel
    this.lfo = this.ctx.createOscillator();
    this.lfo.frequency.value = recipe.lfoHz;
    this.lfoGain = this.ctx.createGain();
    this.lfoGain.gain.value = recipe.filterHz * 0.25;
    this.lfo.connect(this.lfoGain).connect(this.filter.frequency);
    this.lfo.start();
    // Первая нота сразу, без setTimeout, чтобы звук появился моментально
    this._scheduleNextNote();
  }
  _scheduleNextNote() {
    if (!this.alive) return;
    const r = this.recipe;
    const interval = r.intervals[Math.floor(Math.random() * r.intervals.length)];
    const octave = Math.random() < 0.3 ? 2 : 1;
    const hz = r.baseHz * Math.pow(2, (interval + (octave - 1) * 12) / 12);
    this._playNote(hz, r.pulseLen);
    const jitter = r.rateMs * (0.7 + Math.random() * 0.6);
    this.timer = setTimeout(() => this._scheduleNextNote(), jitter);
  }
  _playNote(hz, durSec) {
    const t0 = this.ctx.currentTime;
    const osc1 = this.ctx.createOscillator();
    const osc2 = this.ctx.createOscillator();
    osc1.type = "sine"; osc2.type = "triangle";
    osc1.frequency.value = hz;
    osc2.frequency.value = hz * 1.005;  // slight detune for warmth
    const env = this.ctx.createGain();
    env.gain.value = 0;
    osc1.connect(env); osc2.connect(env);
    env.connect(this.master);
    const peak = this.recipe.gain;
    env.gain.linearRampToValueAtTime(peak, t0 + durSec * 0.3);
    env.gain.exponentialRampToValueAtTime(0.0001, t0 + durSec);
    osc1.start(t0); osc2.start(t0);
    osc1.stop(t0 + durSec + 0.1);
    osc2.stop(t0 + durSec + 0.1);
  }
  setLevel(v, rampMs) {
    const t0 = this.ctx.currentTime;
    const ramp = (rampMs || 4000) / 1000;
    this.master.gain.cancelScheduledValues(t0);
    this.master.gain.linearRampToValueAtTime(v, t0 + ramp);
  }
  stop(rampMs) {
    this.alive = false;
    this.setLevel(0, rampMs);
    setTimeout(() => {
      try { this.lfo && this.lfo.stop(); } catch(e){}
      try { this.master.disconnect(); } catch(e){}
      try { this.filter.disconnect(); } catch(e){}
      if (this.timer) clearTimeout(this.timer);
    }, (rampMs || 4000) + 200);
  }
}

/* ---- Sample voice -------------------------------------------------------
   Проигрывает один луп в loop=true режиме через BufferSource → lowpass → master.
   Одноразовый «старт», фейды идут по master.gain — идентичный API с AmbientVoice.
-------------------------------------------------------------------------- */
class SampleVoice {
  constructor(ctx, dest, buffer, params) {
    this.ctx = ctx;
    this.master = ctx.createGain();
    this.master.gain.value = 0;
    this.filter = ctx.createBiquadFilter();
    this.filter.type = "lowpass";
    this.filter.frequency.value = (params && params.filterHz) || 4000;
    this.filter.Q.value = 0.4;
    this.master.connect(this.filter).connect(dest);
    this.src = ctx.createBufferSource();
    this.src.buffer = buffer;
    this.src.loop = true;
    if (params && params.rate) this.src.playbackRate.value = params.rate;
    this.src.connect(this.master);
    this.peak = (params && params.gain) || 0.85;
    this.alive = true;
  }
  start() {
    try { this.src.start(); } catch (_) {}
  }
  setLevel(v, rampMs) {
    const t0 = this.ctx.currentTime;
    const ramp = (rampMs || 4000) / 1000;
    this.master.gain.cancelScheduledValues(t0);
    // линейный ramp до v * peak (нормализуем громкость сэмплов)
    this.master.gain.linearRampToValueAtTime(v * this.peak, t0 + ramp);
  }
  stop(rampMs) {
    this.alive = false;
    this.setLevel(0, rampMs);
    setTimeout(() => {
      try { this.src.stop(); } catch (_) {}
      try { this.src.disconnect(); } catch (_) {}
      try { this.master.disconnect(); } catch (_) {}
      try { this.filter.disconnect(); } catch (_) {}
    }, (rampMs || 4000) + 200);
  }
}

class AmbientEngine {
  constructor() {
    this.ctx = null;
    this.outGain = null;
    this.voice = null;
    this.muted = false;
    this.targetLevel = 1.0;
    this.bufferCache = new Map();   // url → AudioBuffer
    this.fetchPromises = new Map(); // url → Promise<AudioBuffer>
  }
  async ensureCtx() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.outGain = this.ctx.createGain();
    this.outGain.gain.value = this.targetLevel;
    this.outGain.connect(this.ctx.destination);
    if (this.ctx.state === "suspended") await this.ctx.resume();
  }
  async _loadBuffer(url) {
    if (this.bufferCache.has(url)) return this.bufferCache.get(url);
    if (this.fetchPromises.has(url)) return this.fetchPromises.get(url);
    const p = (async () => {
      const res = await fetch(url, { cache: "force-cache" });
      if (!res.ok) throw new Error(`fetch failed: ${res.status}`);
      const arr = await res.arrayBuffer();
      const buf = await this.ctx.decodeAudioData(arr);
      this.bufferCache.set(url, buf);
      return buf;
    })();
    this.fetchPromises.set(url, p);
    try {
      return await p;
    } finally {
      this.fetchPromises.delete(url);
    }
  }
  async setState(state) {
    await this.ensureCtx();
    const fadeMs = this.voice ? 3000 : 1500;
    this._setStateSeq = (this._setStateSeq || 0) + 1;
    const seq = this._setStateSeq;

    // Если буфер уже в кэше — сразу сэмпл, без синтеза-прогрева.
    if (state.loop && this.bufferCache.has(state.loop)) {
      const buf = this.bufferCache.get(state.loop);
      const sample = new SampleVoice(this.ctx, this.outGain, buf, state.sample);
      sample.start();
      sample.setLevel(0, 0);
      sample.setLevel(1.0, fadeMs);
      if (this.voice) this.voice.stop(fadeMs);
      this.voice = sample;
      this._notifyLoading(false);
      return;
    }

    // Иначе: 1) Синтез-прогрев моментально и 2) в фоне пытаемся подменить на сэмпл.
    const synthVoice = new AmbientVoice(this.ctx, this.outGain);
    synthVoice.start(state.synth);
    synthVoice.setLevel(0, 0);
    synthVoice.setLevel(1.0, fadeMs);
    if (this.voice) this.voice.stop(fadeMs);
    this.voice = synthVoice;

    if (!state.loop) { this._notifyLoading(false); return; }

    this._notifyLoading(true);
    this._loadBuffer(state.loop).then((buf) => {
      // Если за это время состояние сменилось или voice уже другой — выходим.
      if (seq !== this._setStateSeq) { this._notifyLoading(false); return; }
      if (this.voice !== synthVoice) { this._notifyLoading(false); return; }
      // Fade synth → sample за 2с (короче чем первичный фейд, чтобы «подмена» была слышна)
      const swapMs = 2000;
      const sample = new SampleVoice(this.ctx, this.outGain, buf, state.sample);
      sample.start();
      sample.setLevel(0, 0);
      sample.setLevel(1.0, swapMs);
      synthVoice.stop(swapMs);
      this.voice = sample;
      this._notifyLoading(false);
    }).catch((e) => {
      console.warn("sample load failed, staying on synth:", state.id, e);
      this._notifyLoading(false);
    });
  }
  onLoadingChange(cb) { this._onLoading = cb; }
  _notifyLoading(v) { if (this._onLoading) this._onLoading(v); }
  setMuted(m) {
    this.muted = m;
    if (!this.outGain) return;
    const t0 = this.ctx.currentTime;
    this.outGain.gain.cancelScheduledValues(t0);
    this.outGain.gain.linearRampToValueAtTime(m ? 0 : this.targetLevel, t0 + 0.4);
  }
}

/* ---- Visualizer --------------------------------------------------------- */
class Visualizer {
  constructor(el) {
    this.bars = Array.from(el.querySelectorAll(".bar"));
    this.alive = true;
    this._tick();
  }
  _tick() {
    if (!this.alive) return;
    this.bars.forEach((bar) => {
      // больше амплитуды: 0.25–1.0 вместо 0.3–0.85
      const h = 0.25 + Math.random() * 0.75;
      const dur = 550 + Math.random() * 320;
      bar.style.transition = `transform ${dur}ms cubic-bezier(0.32, 0.72, 0, 1)`;
      bar.style.transform = `scaleY(${h})`;
    });
    setTimeout(() => this._tick(), 650);
  }
}

/* ---- DOM ---------------------------------------------------------------- */
const $ = (id) => document.getElementById(id);
const dom = {
  stateName: $("state-name"),
  trackName: $("track-name"),
  sleeve: $("sleeve"),
  viz: $("viz"),
  price: $("price"),
  delta: $("delta"),
  mute: $("mute"),
  cta: $("cta"),
  tapHint: $("tap-hint"),
  status: $("status"),
  welcome: $("welcome"),
  welcomePlay: $("welcome-play"),
  welcomeFoot: $("welcome-foot"),
  onAir: $("on-air")
};
const CTA_URL = "https://app.hyperliquid.xyz/join/SIBERIA"; // TODO: real ref after legal check
dom.cta.href = CTA_URL;

const audio = new AmbientEngine();

/* ---- UI loading indicator ----------------------------------------------
   Показываем во время fetch+decode сэмплов. Буфер still.ogg начинаем
   подгружать сразу (eagerly), но без AudioContext (файл в кэше браузера).
-------------------------------------------------------------------------- */
async function eagerPrefetch(url) {
  // До создания AudioContext мы не можем декодировать, но файл
  // ляжет в HTTP-кэш браузера — его повторный fetch в энджине будет мгновенным.
  try { await fetch(url, { cache: "force-cache" }); } catch (_) {}
}
eagerPrefetch("audio/still.ogg");

audio.onLoadingChange((loading) => {
  if (!dom.welcome.classList.contains("hidden")) {
    // Оверлей видим — показываем спиннер на кнопке
    dom.welcomePlay.classList.toggle("loading", loading);
    if (dom.welcomeFoot) {
      dom.welcomeFoot.textContent = loading ? "loading lo-fi loops…" : "tap to start · sound on";
      dom.welcomeFoot.classList.toggle("fade", loading);
    }
  } else {
    // Оверлей уже закрыт — тихо показываем в status-line
    if (loading) dom.status.textContent = "loading texture";
    else if (dom.status.textContent === "loading texture") dom.status.textContent = "";
  }
});
const viz = new Visualizer(dom.viz);

/* ---- State management --------------------------------------------------- */
let lastState = null;
let started = false;
let online = false;

function classifyState(pct) {
  return STATES.find(s => pct >= s.min && pct < s.max) || STATES[2];
}

/* ---- Color interpolation ------------------------------------------------
   Плавная интерполяция фона между соседними состояниями. Цвет «скользит» по
   цене внутри диапазона, а не переключается ступенями. Старт и конец ряда
   (FALLING < -1.5%, SURGE > 1.5%) фиксируются.
-------------------------------------------------------------------------- */
function hexToRgb(h) {
  const m = h.replace("#", "");
  return [parseInt(m.slice(0,2),16), parseInt(m.slice(2,4),16), parseInt(m.slice(4,6),16)];
}
function rgbToHex(r,g,b) {
  const c = (n) => Math.round(Math.max(0, Math.min(255, n))).toString(16).padStart(2, "0");
  return "#" + c(r) + c(g) + c(b);
}
function lerpColor(a, b, t) {
  const A = hexToRgb(a), B = hexToRgb(b);
  return rgbToHex(A[0] + (B[0]-A[0])*t, A[1] + (B[1]-A[1])*t, A[2] + (B[2]-A[2])*t);
}

// Опорные точки для интерполяции: центры диапазонов каждого состояния
function stateAnchorPct(s) {
  if (s.min === -Infinity) return -2.5; // FALLING anchor
  if (s.max === Infinity)  return  2.5; // SURGE anchor
  return (s.min + s.max) / 2;
}

function interpolatedColors(pct) {
  const anchors = STATES.map(s => ({ pct: stateAnchorPct(s), bg: s.bg, accent: s.accent, sleeve: s.sleeve }));
  // Находим двух соседей
  if (pct <= anchors[0].pct) return { bg: anchors[0].bg, accent: anchors[0].accent, sleeve: anchors[0].sleeve };
  if (pct >= anchors[anchors.length-1].pct) {
    const a = anchors[anchors.length-1];
    return { bg: a.bg, accent: a.accent, sleeve: a.sleeve };
  }
  for (let i = 0; i < anchors.length - 1; i++) {
    const a = anchors[i], b = anchors[i+1];
    if (pct >= a.pct && pct <= b.pct) {
      const t = (pct - a.pct) / (b.pct - a.pct);
      return {
        bg:     lerpColor(a.bg,     b.bg,     t),
        accent: lerpColor(a.accent, b.accent, t),
        sleeve: lerpColor(a.sleeve, b.sleeve, t)
      };
    }
  }
  return { bg: anchors[2].bg, accent: anchors[2].accent, sleeve: anchors[2].sleeve };
}

function applyContinuousColor(pct) {
  const c = interpolatedColors(pct);
  const root = document.documentElement.style;
  root.setProperty("--bg", c.bg);
  root.setProperty("--accent", c.accent);
  root.setProperty("--sleeve", c.sleeve);
}

function applyVisualState(state) {
  // swap state name with cross-fade (текст меняется дискретно при переходе границы)
  dom.stateName.classList.add("swap");
  dom.trackName.classList.add("swap");
  setTimeout(() => {
    dom.stateName.textContent = state.label;
    setTimeout(() => dom.stateName.classList.remove("swap"), 50);
  }, 600);
  setTimeout(() => {
    dom.trackName.textContent = state.track;
    setTimeout(() => dom.trackName.classList.remove("swap"), 50);
  }, 1000);
}

async function setMarketState(state, force = false) {
  if (!force && lastState && state.id === lastState.id) return;
  lastState = state;
  applyVisualState(state);
  if (started) await audio.setState(state);
}

function updateTicker(price, pct) {
  dom.price.textContent = "₿ " + price.toLocaleString("en-US", { maximumFractionDigits: 0 });
  const sign = pct >= 0 ? "+" : "";
  dom.delta.textContent = sign + pct.toFixed(2) + "%  · 1h";
  dom.delta.className = pct >= 0 ? "delta-up" : "delta-down";
}

function setStatus(text) {
  if (text) {
    dom.status.textContent = text;
    dom.status.classList.add("visible");
  } else {
    dom.status.classList.remove("visible");
  }
}

/* ---- Price polling ------------------------------------------------------ */
async function fetchBtc() {
  const url = "https://api.coingecko.com/api/v3/coins/markets"
            + "?vs_currency=usd&ids=bitcoin&price_change_percentage=1h";
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error("coingecko " + res.status);
  const arr = await res.json();
  return {
    price: arr[0].current_price,
    pct: arr[0].price_change_percentage_1h_in_currency ?? 0
  };
}

async function tick() {
  try {
    const { price, pct } = await fetchBtc();
    online = true;
    setStatus("");
    updateTicker(price, pct);
    // Непрерывный цвет скользит по цене каждый tick — даже внутри одного состояния
    applyContinuousColor(pct);
    const state = classifyState(pct);
    await setMarketState(state);
  } catch (e) {
    console.warn("price fetch failed", e);
    online = false;
    setStatus("reconnecting");
  }
}

/* ---- First-gesture gate (autoplay) -------------------------------------
   Стратегия:
   1. На первом визите ждём любой жест (mousemove/scroll/touch/key/click).
      Порог почти невидим — пользователь просто двигает мышь.
   2. После первого успеха пишем флаг в localStorage.
   3. На повторных визитах пытаемся resume() сразу — Chrome разрешит без
      жеста через Media Engagement Index, если слушали ≥7с в прошлый раз.
      Если отказ — тихо падаем на fallback (любой жест).
-------------------------------------------------------------------------- */
const RETURN_KEY = "hodlfm.audioOk";
const gestureEvents = ["pointerdown", "click", "keydown", "touchstart", "mousemove", "scroll", "wheel"];

async function begin() {
  if (started) return;
  started = true;
  dom.tapHint.classList.add("hidden");
  dom.welcome.classList.add("hidden");
  dom.onAir.classList.add("live");
  // отписываемся от всех gesture-листенеров, чтобы без утечек
  gestureEvents.forEach(ev => document.removeEventListener(ev, gestureHandler, true));
  try {
    await audio.ensureCtx();
    if (lastState) await audio.setState(lastState);
    // помечаем что хотя бы раз запускался успешно — следующий визит попробует без жеста
    try { localStorage.setItem(RETURN_KEY, "1"); } catch (_) {}
  } catch (e) {
    console.warn("audio start failed", e);
    started = false;
    dom.onAir.classList.remove("live");
    dom.tapHint.classList.remove("hidden");
    dom.welcome.classList.remove("hidden");
  }
}

function gestureHandler() {
  if (!started) begin();
}

// Широкий набор жестов — любое взаимодействие стартует звук.
// passive: true — не блокируем скролл/жесты. capture: true — ловим раньше всех.
gestureEvents.forEach(ev => {
  document.addEventListener(ev, gestureHandler, { passive: true, capture: true });
});

// Отдельный явный хэндлер на play-кнопку — для iOS Safari и a11y
dom.welcomePlay.addEventListener("click", (e) => {
  e.stopPropagation();
  begin();
});

// Попытка немедленного старта для вернувшихся (Media Engagement Index).
// Если браузер разрешит — audio заиграет без жеста. Если нет — останемся в suspended,
// ловим варнинг в console (это ожидаемо), первый же жест из gestureHandler его разбудит.
async function tryAutoStart() {
  let returning = false;
  try { returning = localStorage.getItem(RETURN_KEY) === "1"; } catch (_) {}
  if (!returning) return;
  // Вернувшемуся пользователю оверлей не нужен — скрываем сразу
  dom.welcome.classList.add("hidden");
  if (started) return;
  try {
    await audio.ensureCtx();
    if (audio.ctx && audio.ctx.state === "running") {
      started = true;
      dom.tapHint.classList.add("hidden");
      dom.onAir.classList.add("live");
      gestureEvents.forEach(ev => document.removeEventListener(ev, gestureHandler, true));
      if (lastState) await audio.setState(lastState);
    }
  } catch (_) {
    // тихое падение — fallback на жест уже висит
  }
}

dom.mute.addEventListener("click", (e) => {
  e.stopPropagation();
  if (!started) { begin(); return; }
  const m = !audio.muted;
  audio.setMuted(m);
  dom.mute.textContent = m ? "○" : "◉";
  dom.viz.classList.toggle("muted", m);
});

dom.cta.addEventListener("click", (e) => e.stopPropagation());

/* ---- Boot --------------------------------------------------------------- */
// Показываем дефолтное STILL сразу, чтобы sleeve не был пустым до первого fetch'а.
const stillState = STATES.find(s => s.id === "still");
dom.stateName.textContent = stillState.label;
dom.trackName.textContent = stillState.track;
document.documentElement.style.setProperty("--bg", stillState.bg);
document.documentElement.style.setProperty("--accent", stillState.accent);
lastState = stillState;
// На первом визите показываем весь overlay; на повторных — маленький tap-hint
{
  let returning = false;
  try { returning = localStorage.getItem(RETURN_KEY) === "1"; } catch (_) {}
  if (returning) {
    dom.welcome.classList.add("hidden");
    dom.tapHint.classList.remove("hidden");
  }
  // иначе welcome уже виден по дефолту, tapHint остаётся hidden
}
tick();
// 15с — частый опрос для ¨живого¨ фона. CoinGecko free допускает ~30 req/min, мы делаем 4
setInterval(tick, 15_000);
tryAutoStart();
</script>
